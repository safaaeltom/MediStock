<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MediStock</title>
  </head>
  <body>
    <div id="page-wrapper">
        <header id="header">
            <h1>MediStock</h1>
            <p>A pharmacy inventory UI</p>
            <form id="search-medicine">
                <input type="text" placeholder="Search medicine"/>
            </form>
        </header>
        <main>
        <div id="Drugs-list">
            <h2>Available drugs</h2>
            <ul>
                <li>
                    <span class="name">Paracetamol</span>
                    <span class="quantity">30</span>
                    <span class="delete">Delete</span>
                </li>
                <li>
                    <span class="name">Ibuprofen</span>
                    <span class="quantity">23</span>
                    <span class="delete">Delete</span>
                </li>
                <li>
                    <span class="name">Atenolol</span>
                    <span class="quantity">17</span>
                    <span class="delete">Delete</span>
                </li>
            </ul>
            <form id="add-medicine">
                <input type="text" placeholder="Add medicine"/>
                <button type="submit">Add</button>
            </form>
        </div>
        </main>
        <footer>
        </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
